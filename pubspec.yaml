name: my_church_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  scrollable_positioned_list: ^0.3.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  share_plus: ^10.1.0
  xml: ^6.5.0
  audioplayers: ^5.2.1
  # ఇక్కడ వెర్షన్ ని ^33.1.45 కి పెంచాను (Error Fix)
  syncfusion_flutter_pdfviewer: ^33.1.45

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bible.xml
    - assets/data/
    - assets/fonts/
    - assets/cross_refs/
    
  fonts:
    - family: BalooTammudu2
      fonts:
        - asset: assets/fonts/BalooTammudu2.ttf