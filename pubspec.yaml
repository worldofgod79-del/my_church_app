name: my_church_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

# ఇక్కడ ఎర్రర్ వస్తోంది, దీన్ని ఇప్పుడు సరిచేశాను
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  scrollable_positioned_list: ^0.3.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  share_plus: ^10.1.0
  xml: ^6.5.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # అసెట్స్ ఇక్కడ ఉన్నాయి
  assets:
    - assets/bible.xml
    - assets/data/
    
  # నువ్వు అడిగిన తెలుగు ఫాంట్ ఇక్కడ ఉంది
  fonts:
    - family: BalooTammudu2
      fonts:
        - asset: assets/fonts/BalooTammudu2.ttf