name: my_church_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^12.0.0      # వెబ్ లో ఫాస్ట్ నావిగేషన్ కోసం
  sqflite: ^2.3.0         # బైబిల్ కోసం (Android)
  path: ^1.8.3
  provider: ^6.0.5        # డేటా మేనేజ్‌మెంట్ కోసం

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  # ఇక్కడ తర్వాత మనం బైబిల్ డేటాబేస్ ఫైల్స్ యాడ్ చేస్తాం
