name: Build App
on: [push]
permissions:
  contents: write
jobs:
  # 1. వెబ్ బిల్డ్ (Instant Preview)
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Configure Web
        run: |
          flutter create . --platforms web
          flutter pub get
      - name: Build Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  # 2. ఆండ్రాయిడ్ APK బిల్డ్ (పర్మిషన్స్ ఇంజెక్ట్ చేయబడ్డాయి)
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Create Clean Android Project
        run: |
          flutter create . --platforms android
          flutter pub get

      # ఇది మ్యాజిక్ స్టెప్: AndroidManifest లోకి ఇంటర్నెట్ పర్మిషన్ యాడ్ చేస్తుంది
      - name: Inject Internet Permission
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
