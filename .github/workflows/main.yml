name: Build App
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # ఇక్కడ మనం లేటెస్ట్ ఫ్లట్టర్ వెర్షన్ వాడుతున్నాం
          flutter-version: '3.24.x' 
          
      - name: Create Platform Folders
        run: |
          flutter create . --platforms web,android
          flutter pub get

      # ఈ కమాండ్ లో --no-wasm మరియు --web-renderer html యాడ్ చేశాను
      - name: Build Web
        run: |
          flutter build web --release --web-renderer html --no-wasm --base-href "/${{ github.event.repository.name }}/"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web